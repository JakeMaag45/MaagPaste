name: Build MaagPaste

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --windowed --name MaagPaste --add-data "icon.ico;." --icon icon.ico --hidden-import customtkinter --hidden-import pyperclip --hidden-import pystray --hidden-import keyboard --hidden-import PIL --hidden-import requests maagpaste.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: MaagPaste-Windows
        path: dist/MaagPaste.exe
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/MaagPaste.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows-exe:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        pip install customtkinter pyperclip pystray keyboard Pillow requests
    
    - name: Build with PyInstaller (standalone)
      run: |
        pyinstaller --onefile --windowed --name MaagPaste --add-data "icon.ico;." --icon icon.ico --collect-all customtkinter --collect-all pystray maagpaste.py
    
    - name: Upload executable
      uses: actions/upload-artifact@v4
      with:
        name: MaagPaste-Standalone
        path: dist/MaagPaste.exe
